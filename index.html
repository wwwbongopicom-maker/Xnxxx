<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLAG SURVIVOR · AUTO START</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --neon-cyan: #00f7ff;
            --bg-deep: #0a0c15;
            --bg-panel: rgba(12, 20, 30, 0.75);
            --glass-edge: rgba(0, 247, 255, 0.2);
        }
        body {
            background: radial-gradient(circle at 30% 10%, #1e2a3a, var(--bg-deep) 80%);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 1rem; color: #fff; overflow: hidden;
        }
        .game-container {
            max-width: 380px; width: 100%;
            background: rgba(5, 8, 15, 0.6); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-edge); border-radius: 42px;
            padding: 24px 20px; box-shadow: 0 0 30px rgba(0, 247, 255, 0.2);
        }
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        h1 { font-size: 1.5rem; text-transform: uppercase; color: var(--neon-cyan); letter-spacing: 2px; }
        .player-badge { background: rgba(0, 247, 255, 0.1); border: 1px solid var(--neon-cyan); border-radius: 40px; padding: 4px 12px; font-size: 0.8rem; }
        canvas { width: 100%; max-width: 300px; aspect-ratio: 1/1; border-radius: 50%; background: #03060b; border: 3px solid rgba(0, 247, 255, 0.3); display: block; margin: 0 auto; }
        .eliminated-panel { background: var(--bg-panel); border-radius: 20px; padding: 15px; margin-top: 15px; border: 1px solid var(--glass-edge); max-height: 110px; overflow: hidden; }
        .flag-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
        .flag-item { aspect-ratio: 3/2; border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .flag-item img { width: 100%; height: 100%; object-fit: cover; }
        .stats-box { background: var(--bg-panel); border-radius: 20px; padding: 15px; margin-top: 15px; border: 1px solid var(--glass-edge); }
        .stat-entry { background: rgba(0, 150, 200, 0.1); padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .winner-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #08121c; border: 2px solid var(--neon-cyan); border-radius: 40px; padding: 30px; width: 260px; text-align: center; z-index: 1000; display: none; box-shadow: 0 0 50px var(--neon-cyan); }
        .win-flag { width: 120px; border-radius: 10px; margin: 15px 0; border: 2px solid #fff; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="top-bar">
        <h1>Flag Battle</h1>
        <div class="player-badge"><span id="players">1250 online</span></div>
    </div>
    <canvas id="c"></canvas>
    <div class="eliminated-panel">
        <h3 style="font-size:0.8rem; margin-bottom:8px; color:#9bc8d9;">ELIMINATED</h3>
        <div class="flag-grid" id="panel"></div>
    </div>
    <div class="stats-box">
        <div class="stats-list" id="statsList"></div>
    </div>
</div>

<div id="winner" class="winner-popup">
    <img class="win-flag" id="winflag" src="">
    <div id="winname" style="font-size:1.5rem; font-weight:bold; color:#fff;"></div>
    <p style="color: #00f7ff; margin-top:5px;">ROUND WINNER!</p>
</div>

<script>
    (function() {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const size = 300;
        canvas.width = size; canvas.height = size;
        const cx = size/2, cy = size/2, radius = size/2 - 10;

        let audioCtx = null, bounceBuffer = null, playing = false;
        const countries = [
            {code:"us", name:"USA"}, {code:"gb", name:"UK"}, {code:"ca", name:"Canada"},
            {code:"au", name:"Australia"}, {code:"in", name:"India"}, {code:"br", name:"Brazil"},
            {code:"jp", name:"Japan"}, {code:"de", name:"Germany"}, {code:"fr", name:"France"},
            {code:"it", name:"Italy"}, {code:"es", name:"Spain"}, {code:"ru", name:"Russia"},
            {code:"cn", name:"China"}, {code:"bd", name:"Bangladesh"}, {code:"pk", name:"Pakistan"},
            {code:"id", name:"Indonesia"}, {code:"ar", name:"Argentina"}, {code:"pt", name:"Portugal"}
        ];

        const images = {};
        countries.forEach(c => {
            const img = new Image();
            img.src = `https://flagcdn.com/w160/${c.code}.png`;
            images[c.code] = img;
        });

        // সাউন্ড লোড (ইউজার ক্লিক না করলে এটি এরর দিতে পারে, তবে গেম আটকাবে না)
        async function loadBounceSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const res = await fetch('https://assets.mixkit.co/active_storage/sfx/2792/2792-preview.mp3');
                const buffer = await res.arrayBuffer();
                bounceBuffer = await audioCtx.decodeAudioData(buffer);
            } catch (e) {}
        }

        function playBounceSound() {
            if (!bounceBuffer || !audioCtx || audioCtx.state !== 'running') return;
            const source = audioCtx.createBufferSource();
            source.buffer = bounceBuffer;
            source.connect(audioCtx.destination);
            source.start();
        }

        let flags = [];
        let rotation = 0;
        const gapSize = 0.7;

        function initGame() {
            flags = countries.map(c => ({
                img: images[c.code], name: c.name, code: c.code,
                x: cx, y: cy, dx: (Math.random()-0.5)*5, dy: (Math.random()-0.5)*5,
                r: 10, out: false
            }));
            document.getElementById('panel').innerHTML = '';
        }

        function animate() {
            if (!playing) return;
            ctx.clearRect(0,0,size,size);
            rotation += 0.025;

            ctx.beginPath();
            ctx.arc(cx, cy, radius, rotation + gapSize, rotation + 2*Math.PI);
            ctx.strokeStyle = '#00f7ff';
            ctx.lineWidth = 5;
            ctx.stroke();

            for (let i = flags.length-1; i>=0; i--) {
                const f = flags[i];
                f.x += f.dx; f.y += f.dy; f.dy += 0.06;
                const dx = f.x - cx, dy = f.y - cy, dist = Math.sqrt(dx*dx + dy*dy);

                if (dist + f.r > radius && !f.out) {
                    let angle = Math.atan2(dy, dx);
                    if (angle < 0) angle += 2*Math.PI;
                    const rotNorm = rotation % (2*Math.PI);
                    if (!(angle > rotNorm && angle < rotNorm + gapSize)) {
                        const nx = dx/dist, ny = dy/dist;
                        const dot = f.dx*nx + f.dy*ny;
                        f.dx -= 2*dot*nx; f.dy -= 2*dot*ny;
                        playBounceSound();
                    } else { f.out = true; }
                }

                if (f.out && dist > radius + 20) {
                    const panel = document.getElementById('panel');
                    const div = document.createElement('div');
                    div.className = 'flag-item';
                    div.innerHTML = `<img src="${f.img.src}">`;
                    panel.prepend(div);
                    if (panel.children.length > 24) panel.removeChild(panel.lastChild);
                    flags.splice(i,1);
                    continue;
                }

                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.beginPath(); ctx.arc(0,0,f.r,0,Math.PI*2); ctx.clip();
                ctx.drawImage(f.img, -f.r, -f.r, f.r*2, f.r*2);
                ctx.restore();
            }

            if (flags.length === 1) {
                playing = false;
                showWinner(flags[0]);
                return;
            }
            requestAnimationFrame(animate);
        }

        function showWinner(f) {
            const winDiv = document.getElementById('winner');
            document.getElementById('winname').innerText = f.name;
            document.getElementById('winflag').src = f.img.src;
            winDiv.style.display = 'block';

            setTimeout(() => {
                winDiv.style.display = 'none';
                startGame();
            }, 4000);
        }

        function startGame() {
            playing = true;
            initGame();
            animate();
        }

        // পেজ লোড হওয়ার সাথে সাথে স্টার্ট
        window.onload = () => {
            startGame();
            loadBounceSound(); 
        };

        // অনলাইন প্লেয়ার আপডেট
        setInterval(() => {
            document.getElementById('players').innerText = (1200 + Math.floor(Math.random()*100)) + " online";
        }, 2500);

    })();
</script>
</body>
</html>
