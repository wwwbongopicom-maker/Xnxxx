<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAG SURVIVOR · AUTO START</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{
background:#0a0c15;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
canvas{
width:85vw;
height:85vw;
max-width:300px;
max-height:300px;
border-radius:50%;
border:3px solid cyan;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>
(function(){

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let size = Math.min(window.innerWidth * 0.85, 300);
canvas.width = size;
canvas.height = size;

const cx = size/2;
const cy = size/2;
const radius = size/2 - 10;

const countries = [
{code:"us",name:"USA"},
{code:"bd",name:"Bangladesh"},
{code:"in",name:"India"},
{code:"pk",name:"Pakistan"},
{code:"br",name:"Brazil"},
{code:"fr",name:"France"},
{code:"de",name:"Germany"},
{code:"jp",name:"Japan"}
];

const images = {};
countries.forEach(c=>{
let img=new Image();
img.src=`https://flagcdn.com/w160/${c.code}.png`;
images[c.code]=img;
});

let flags=[];
let rotation=0;
let playing=true;

function initGame(){
flags=countries.map(c=>({
img:images[c.code],
name:c.name,
code:c.code,
x:cx+(Math.random()-0.5)*60,
y:cy+(Math.random()-0.5)*60,
dx:(Math.random()-0.5)*2,
dy:(Math.random()-0.5)*2,
r:12,
out:false
}));
}

function animate(){
if(!playing)return;

ctx.clearRect(0,0,size,size);

rotation+=0.01;

ctx.beginPath();
ctx.arc(cx,cy,radius,rotation,rotation+2*Math.PI);
ctx.strokeStyle='cyan';
ctx.lineWidth=4;
ctx.stroke();

for(let i=flags.length-1;i>=0;i--){
let f=flags[i];

f.x+=f.dx;
f.y+=f.dy;
f.dy+=0.02;

let dx=f.x-cx;
let dy=f.y-cy;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist+f.r>radius){
let nx=dx/dist;
let ny=dy/dist;
let dot=f.dx*nx+f.dy*ny;

f.dx-=2*dot*nx;
f.dy-=2*dot*ny;
}

ctx.save();
ctx.translate(f.x,f.y);
ctx.beginPath();
ctx.arc(0,0,f.r,0,2*Math.PI);
ctx.clip();
ctx.drawImage(f.img,-f.r,-f.r,f.r*2,f.r*2);
ctx.restore();
}

requestAnimationFrame(animate);
}

function startGame(){
initGame();
animate();
}

// AUTO START
window.addEventListener('load',()=>{
setTimeout(()=>{
startGame();
},500);
});

})();
</script>

</body>
</html>
