<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLAG SURVIVOR · ৪০ সেকেন্ড ব্যাটল</title>

<style>
        /* সমস্ত স্টাইল আগের মতোই থাকবে (সংক্ষেপে দেওয়া হলো) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        :root {
            --neon-cyan: #00f7ff;
            --neon-glow: rgba(0, 247, 255, 0.7);
            --bg-deep: #0a0c15;
            --bg-panel: rgba(12, 20, 30, 0.75);
            --glass-edge: rgba(0, 247, 255, 0.2);
            --accent-gradient: linear-gradient(145deg, #00f2ff, #006f8a);
        }
        body {
            background: radial-gradient(circle at 30% 10%, #1e2a3a, var(--bg-deep) 80%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem 0.5rem;
            color: #fff;
        }
        .game-container {
            max-width: 380px;
            width: 100%;
            background: rgba(5, 8, 15, 0.6);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--glass-edge);
            border-radius: 42px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(0, 247, 255, 0.1) inset, 0 0 30px var(--neon-glow);
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding: 0 8px;
        }
        h1 {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(130deg, #ffffff, var(--neon-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px #00f7ff80;
        }
        .player-badge {
            background: rgba(0, 247, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #b2f0ff;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 12px #00f7ff40;
        }
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: 8px 0 14px;
            filter: drop-shadow(0 0 18px #00f7ff4d);
        }
        canvas {
            width: 85vw;
            height: 85vw;
            max-width: 300px;
            max-height: 300px;
            border-radius: 50%;
            background: #03060b;
            border: 3px solid rgba(0, 247, 255, 0.3);
            box-shadow: 0 0 50px #00f7ff30, inset 0 0 30px #00f7ff20;
        }
        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #0a121c;
            width: 100%;
            max-width: 260px;
            margin: 12px auto 16px;
            display: block;
            cursor: pointer;
            box-shadow: 0 10px 20px #00a6bf80, 0 0 20px #00f7ff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.25s;
        }
        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 28px #00b8d4, 0 0 40px #6ef0ff;
        }
        .eliminated-panel {
            background: var(--bg-panel);
            border-radius: 28px;
            padding: 20px 12px;
            margin: 16px 0 20px;
            border: 1px solid var(--glass-edge);
            backdrop-filter: blur(12px);
            /* প্যানেলের উচ্চতা নির্দিষ্ট করতে (ঐচ্ছিক) */
            max-height: 160px; /* তিন লাইনের জন্য উপযুক্ত উচ্চতা */
            overflow-y: hidden; /* স্ক্রল বার আসতে বাধা দেয় */
        }
        .eliminated-panel h3 {
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: #9bc8d9;
            margin-bottom: 12px;
            padding-left: 6px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .eliminated-panel h3 span {
            background: var(--neon-cyan);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 12px #00f7ff;
        }
        .flag-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            min-height: 44px;
        }
        .flag-item {
            aspect-ratio: 3 / 2;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
            background: #111a22;
            animation: flagPop 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.3);
        }
        .flag-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @keyframes flagPop {
            0% { opacity: 0; transform: scale(0.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        .stats-box {
            background: var(--bg-panel);
            border-radius: 24px;
            padding: 18px 16px;
            border: 1px solid var(--glass-edge);
            backdrop-filter: blur(8px);
        }
        .stats-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--neon-cyan);
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .stats-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .stat-entry {
            background: rgba(0, 150, 200, 0.1);
            border-left: 4px solid var(--neon-cyan);
            padding: 8px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #d5eef7;
            display: flex;
            justify-content: space-between;
        }
        .stat-entry span:last-child {
            color: var(--neon-cyan);
            font-weight: 700;
        }
        .winner-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(8, 18, 28, 0.95);
            backdrop-filter: blur(30px);
            border: 2px solid var(--neon-cyan);
            border-radius: 60px;
            padding: 32px 28px;
            width: 280px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 70px #00f7ff, 0 20px 40px black;
            animation: winFloat 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: none;
        }
        @keyframes winFloat {
            0% { opacity: 0; transform: translate(-50%, 20%) scale(0.3); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .win-flag {
            width: 140px;
            border-radius: 16px;
            border: 3px solid white;
            box-shadow: 0 10px 30px var(--neon-cyan);
            margin: 8px 0;
        }
        .win-title {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(145deg, #fff, #b2f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .intro-popup {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .intro-card {
            background: #0a1420;
            border: 2px solid var(--neon-cyan);
            border-radius: 48px;
            padding: 32px 20px;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 0 100px #00f7ff;
        }
        .intro-card button {
            background: var(--accent-gradient);
            border: none;
            border-radius: 60px;
            padding: 16px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #000c14;
            box-shadow: 0 0 30px cyan;
            cursor: pointer;
        }
    </style>
    </head>
<body>

<div class="game-container">
    <div class="top-bar">
        <h1>Country Flags Battle</h1>
        <div class="player-badge"><i></i> <span id="players">1.2k</span></div>
    </div>
    <div class="canvas-wrapper">
        <canvas id="c"></canvas>
    </div>
    <button class="btn-primary" id="startBtn">▶ start battle</button>
    <div class="eliminated-panel">
        <h3><span></span> eliminated flags</h3>
        <div class="flag-grid" id="panel"></div>
    </div>
    <div class="stats-box">
        <div class="stats-header"><i></i> top winners (24h)</div>
        <div class="stats-list" id="statsList"></div>
    </div>
</div>

<div id="winner" class="winner-popup">
    <div class="trophy-icon"></div>
    <img class="win-flag" id="winflag" src="">
    <div class="win-title" id="winname"></div>
    <div class="win-sub">champion of the round</div>
</div>

<div id="firstPopup" class="intro-popup">
    <div class="intro-card">
        <h2> FLAG BATTLE</h2>
        <p>Type your country name in comments<br> to support your team!</p>
        <button onclick="closeFirstPopup()">⚔️ ENTER ARENA</button>
    </div>
</div>

<script>
    (function() {
        // ---------- Canvas setup ----------
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let size = Math.min(window.innerWidth * 0.85, 300);
        canvas.width = size;
        canvas.height = size;
        const cx = size / 2;
        const cy = size / 2;
        const radius = size / 2 - 12;

        // ---------- Player counter (fake) ----------
        let players = 1200;
        const playerSpan = document.getElementById('players');
        setInterval(() => {
            players += Math.floor(Math.random() * 20 - 10);
            if (players < 900) players = 900;
            playerSpan.innerText = players + ' online';
        }, 2100);

        // ---------- Robust Audio with single context & buffer ----------
        let audioCtx = null;
        let bounceBuffer = null;

        // সাউন্ড ফাইল লোড (পানির ড্রপ সাউন্ড)
        async function loadBounceSound() {
            if (bounceBuffer) return; // already loaded
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const url = 'https://assets.mixkit.co/active_storage/sfx/2792/2792-preview.mp3'; // soft water drop
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                bounceBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                console.log('Sound loaded');
            } catch (e) {
                console.warn('Sound load failed, using fallback', e);
            }
        }

        // বাউন্স সাউন্ড বাজান
        function playBounceSound() {
            const now = Date.now();
            if (now - lastSound < 150) return; // throttle
            lastSound = now;

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => actuallyPlay()).catch(() => {});
            } else {
                actuallyPlay();
            }

            function actuallyPlay() {
                if (!bounceBuffer) return;
                const source = audioCtx.createBufferSource();
                source.buffer = bounceBuffer;
                source.connect(audioCtx.destination);
                source.start();
            }
        }

        // ফ্যালব্যাক (যদি বাফার না থাকে)
        let lastSound = 0;
        const fallbackSound = new Audio('https://assets.mixkit.co/active_storage/sfx/1095/1095-preview.mp3');
        function playBounceSoundFallback() {
            const now = Date.now();
            if (now - lastSound < 200) return;
            fallbackSound.currentTime = 0;
            fallbackSound.play().catch(() => {});
            lastSound = now;
        }

        // ---------- Speech ----------
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }

        // ---------- Countries ----------
        const countries = [ /* তালিকা আগের মতোই থাকবে, সংক্ষেপে কিছু অংশ দেওয়া হলো */ 
  {code:"us", name:"United States"},
            {code:"gb", name:"United Kingdom"},
            {code:"ca", name:"Canada"},
            {code:"au", name:"Australia"},
            {code:"in", name:"India"},
            {code:"cn", name:"China"},
            {code:"jp", name:"Japan"},
            {code:"br", name:"Brazil"},
            {code:"ru", name:"Russia"},
            {code:"de", name:"Germany"},
            {code:"fr", name:"France"},
            {code:"it", name:"Italy"},
            {code:"es", name:"Spain"},
            {code:"mx", name:"Mexico"},
            {code:"ar", name:"Argentina"},
            {code:"za", name:"South Africa"},
            {code:"eg", name:"Egypt"},
            {code:"sa", name:"Saudi Arabia"},
            {code:"tr", name:"Turkey"},
            {code:"ir", name:"Iran"},
            {code:"pk", name:"Pakistan"},
            {code:"bd", name:"Bangladesh"},
            {code:"id", name:"Indonesia"},
            {code:"ph", name:"Philippines"},
            {code:"vn", name:"Vietnam"},
            {code:"th", name:"Thailand"},
            {code:"kr", name:"South Korea"},
            {code:"ng", name:"Nigeria"},
            {code:"ke", name:"Kenya"},
            {code:"co", name:"Colombia"},
            {code:"cl", name:"Chile"},
            {code:"pe", name:"Peru"},
            {code:"ve", name:"Venezuela"},
            {code:"pl", name:"Poland"},
            {code:"ua", name:"Ukraine"},
            {code:"nl", name:"Netherlands"},
            {code:"be", name:"Belgium"},
            {code:"se", name:"Sweden"},
            {code:"no", name:"Norway"},
            {code:"fi", name:"Finland"},
            {code:"dk", name:"Denmark"},
            {code:"ch", name:"Switzerland"},
            {code:"at", name:"Austria"},
            {code:"gr", name:"Greece"},
            {code:"pt", name:"Portugal"},
            {code:"cz", name:"Czech Republic"},
            {code:"hu", name:"Hungary"},
            {code:"ro", name:"Romania"},
            {code:"il", name:"Israel"},
            {code:"ae", name:"United Arab Emirates"}
        ];

        const images = {};
        countries.forEach(c => {
            const img = new Image();
            img.src = `https://flagcdn.com/w160/${c.code}.png`;
            images[c.code] = img;
        });

        // ---------- Winners stats ----------
        function saveWinner(name) {
            let data = JSON.parse(localStorage.getItem('winners24')) || [];
            const now = Date.now();
            data.push({ name, time: now });
            data = data.filter(d => now - d.time < 86400000);
            localStorage.setItem('winners24', JSON.stringify(data));
            updateStats();
        }
        function updateStats() {
            let data = JSON.parse(localStorage.getItem('winners24')) || [];
            const now = Date.now();
            data = data.filter(d => now - d.time < 86400000);
            const count = {};
            data.forEach(d => count[d.name] = (count[d.name] || 0) + 1);
            const sorted = Object.entries(count).sort((a,b)=>b[1]-a[1]).slice(0,10);
            const html = sorted.map(([name, wins]) => `<div class="stat-entry"><span>${name}</span> <span>${wins}</span></div>`).join('');
            document.getElementById('statsList').innerHTML = html || '<div class="stat-entry" style="grid-column:span 2;">✨ no winners yet</div>';
        }
        updateStats();

        // ---------- Game state ----------
        let flags = [];
        let rotation = 0;
        let playing = false;
        let last3Voice = false, last2Voice = false;
        const gapSize = 0.7;

        const panelDiv = document.getElementById('panel');
        const startBtn = document.getElementById('startBtn');
        const winnerDiv = document.getElementById('winner');
        const winName = document.getElementById('winname');
        const winFlag = document.getElementById('winflag');

        function addFlagToPanel(src) {
            const div = document.createElement('div');
            div.className = 'flag-item';
            div.innerHTML = `<img src="${src}" loading="lazy">`;
            panelDiv.appendChild(div);
            // 8 কলাম × ৩ লাইন = ২৪, এর বেশি হলে প্রথম পতাকা সরিয়ে দাও
            if (panelDiv.children.length > 24) {
                panelDiv.removeChild(panelDiv.firstChild);
            }
        }

        function initGame() {
            flags = countries.map(c => ({
                img: images[c.code],
                name: c.name,
                code: c.code,
                x: cx + (Math.random()-0.5)*60,
                y: cy + (Math.random()-0.5)*60,
                dx: (Math.random()-0.5)*2.2,
                dy: (Math.random()-0.5)*2.2,
                r: 12,
                out: false
            }));
            last3Voice = false;
            last2Voice = false;
            panelDiv.innerHTML = '';
        }

        function animate() {
            if (!playing) return;
            ctx.clearRect(0,0,size,size);
            rotation += 0.012;

            ctx.beginPath();
            ctx.arc(cx, cy, radius, rotation + gapSize, rotation + 2*Math.PI);
            ctx.strokeStyle = '#00f7ff';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#00f7ff';
            ctx.shadowBlur = 18;
            ctx.stroke();
            ctx.shadowBlur = 0;

            for (let i = flags.length-1; i>=0; i--) {
                const f = flags[i];
                f.x += f.dx;
                f.y += f.dy;
                f.dy += 0.018;

                const dx = f.x - cx;
                const dy = f.y - cy;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist + f.r > radius && !f.out) {
                    let angle = Math.atan2(dy, dx);
                    if (angle < 0) angle += 2*Math.PI;
                    const rotNorm = rotation % (2*Math.PI);
                    const insideGap = (angle > rotNorm && angle < rotNorm + gapSize);

                    if (!insideGap) {
                        const nx = dx / dist;
                        const ny = dy / dist;
                        const dot = f.dx * nx + f.dy * ny;
                        f.dx -= 2 * dot * nx;
                        f.dy -= 2 * dot * ny;

                        // সাউন্ড বাজান (প্রধান)
                        if (bounceBuffer) playBounceSound();
                        else playBounceSoundFallback();
                    } else {
                        f.out = true;
                    }
                }

                if (f.out && dist > radius + 24) {
                    addFlagToPanel(f.img.src);
                    flags.splice(i,1);
                    continue;
                }

                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.beginPath();
                ctx.arc(0,0,f.r,0,2*Math.PI);
                ctx.clip();
                ctx.drawImage(f.img, -f.r, -f.r, f.r*2, f.r*2);
                ctx.restore();
            }

            if (flags.length === 3 && !last3Voice) { last3Voice = true; speak('Only three countries left'); }
            if (flags.length === 2 && !last2Voice) { last2Voice = true; speak('Final two countries'); }

            if (flags.length === 1) {
                playing = false;
                showWinner(flags[0]);
                return;
            }
            requestAnimationFrame(animate);
        }

        function showWinner(f) {
            saveWinner(f.name);
            winName.innerText = f.name;
            winFlag.src = `https://flagcdn.com/w160/${f.code}.png`;
            winnerDiv.style.display = 'block';
            speak(`Congratulations ${f.name} is the winner`);

            setTimeout(() => {
                winnerDiv.style.display = 'none';
                speak('Next round starting');
                startGame();
            }, 4200);
        }

        function startGame() {
            startBtn.style.display = 'none';
            playing = true;
            initGame();

            // অডিও কনটেক্সট রেজিউম ও সাউন্ড লোড নিশ্চিত
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            } else if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            // প্রথমবার সাউন্ড লোড করুন (ইউজার ইন্টার‌্যাকশনের পর)
            loadBounceSound();

            speak('Write your country name in the comments');
            animate();
        }

        // First popup handling
        if (!localStorage.getItem('firstStart')) {
            document.getElementById('firstPopup').style.display = 'flex';
        }

        window.closeFirstPopup = function() {
            localStorage.setItem('firstStart', 'true');
            document.getElementById('firstPopup').style.display = 'none';
            startGame();
        };

        startBtn.addEventListener('click', startGame);
    })();
</script>
</body>
</html>
