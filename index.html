<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLAG SURVIVOR · ৪০ সেকেন্ড ব্যাটল</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        :root {
            --neon-cyan: #00f7ff;
            --neon-glow: rgba(0, 247, 255, 0.7);
            --bg-deep: #0a0c15;
            --bg-panel: rgba(12, 20, 30, 0.75);
            --glass-edge: rgba(0, 247, 255, 0.2);
            --accent-gradient: linear-gradient(145deg, #00f2ff, #006f8a);
        }
        body {
            background: radial-gradient(circle at 30% 10%, #1e2a3a, var(--bg-deep) 80%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem 0.5rem;
            color: #fff;
            overflow: hidden;
        }
        .game-container {
            max-width: 380px;
            width: 100%;
            background: rgba(5, 8, 15, 0.6);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--glass-edge);
            border-radius: 42px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(0, 247, 255, 0.1) inset, 0 0 30px var(--neon-glow);
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding: 0 8px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(130deg, #ffffff, var(--neon-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .player-badge {
            background: rgba(0, 247, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.8rem;
            color: #b2f0ff;
        }
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }
        canvas {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: #03060b;
            border: 3px solid rgba(0, 247, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 247, 255, 0.2);
        }
        /* স্টার্ট বাটন হাইড করা হয়েছে */
        #startBtn {
            display: none;
        }
        .eliminated-panel {
            background: var(--bg-panel);
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid var(--glass-edge);
            max-height: 120px;
            overflow: hidden;
        }
        .eliminated-panel h3 {
            font-size: 0.8rem;
            color: #9bc8d9;
            margin-bottom: 10px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .eliminated-panel h3 span {
            background: var(--neon-cyan);
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .flag-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
        }
        .flag-item {
            aspect-ratio: 3 / 2;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            animation: flagPop 0.3s ease-out;
        }
        .flag-item img { width: 100%; height: 100%; object-fit: cover; }
        
        @keyframes flagPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .stats-box {
            background: var(--bg-panel);
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid var(--glass-edge);
        }
        .stats-header { color: var(--neon-cyan); font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        .stats-list { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .stat-entry { background: rgba(0, 150, 200, 0.1); padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; display: flex; justify-content: space-between; }

        .winner-popup {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(8, 18, 28, 0.98);
            border: 2px solid var(--neon-cyan);
            border-radius: 40px;
            padding: 30px;
            width: 260px;
            text-align: center;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 50px var(--neon-cyan);
        }
        .win-flag { width: 120px; border-radius: 10px; margin: 15px 0; border: 2px solid #fff; }
        .win-title { font-size: 1.5rem; font-weight: bold; color: #fff; }

        .intro-popup {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .intro-card {
            background: #0a1420; border: 2px solid var(--neon-cyan);
            border-radius: 30px; padding: 40px 20px; text-align: center;
        }
        .intro-card button {
            background: var(--accent-gradient); border: none;
            border-radius: 50px; padding: 15px 40px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>

<body>
<div class="game-container">
    <div class="top-bar">
        <h1>Flag Battle</h1>
        <div class="player-badge"><span id="players">1200 online</span></div>
    </div>
    <div class="canvas-wrapper">
        <canvas id="c"></canvas>
    </div>
    <button id="startBtn">START</button>
    <div class="eliminated-panel">
        <h3><span></span> eliminated flags</h3>
        <div class="flag-grid" id="panel"></div>
    </div>
    <div class="stats-box">
        <div class="stats-header">top winners (24h)</div>
        <div class="stats-list" id="statsList"></div>
    </div>
</div>

<div id="winner" class="winner-popup">
    <img class="win-flag" id="winflag" src="">
    <div class="win-title" id="winname"></div>
    <p style="color: #00f7ff;">CHAMPION!</p>
</div>

<div id="firstPopup" class="intro-popup">
    <div class="intro-card">
        <h2 style="color:#fff; margin-bottom:10px;">FLAG SURVIVOR</h2>
        <p style="color:#ccc;">Type your country name in comments!</p>
        <button onclick="closeFirstPopup()">⚔️ ENTER ARENA</button>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const size = 280;
        canvas.width = size; canvas.height = size;
        const cx = size / 2, cy = size / 2, radius = size / 2 - 10;

        let audioCtx = null, bounceBuffer = null, playing = false;
        const countries = [
            {code:"us", name:"USA"}, {code:"gb", name:"UK"}, {code:"ca", name:"Canada"},
            {code:"au", name:"Australia"}, {code:"in", name:"India"}, {code:"br", name:"Brazil"},
            {code:"jp", name:"Japan"}, {code:"de", name:"Germany"}, {code:"fr", name:"France"},
            {code:"it", name:"Italy"}, {code:"es", name:"Spain"}, {code:"ru", name:"Russia"},
            {code:"cn", name:"China"}, {code:"bd", name:"Bangladesh"}, {code:"pk", name:"Pakistan"},
            {code:"id", name:"Indonesia"}, {code:"ar", name:"Argentina"}, {code:"pt", name:"Portugal"}
        ];

        const images = {};
        countries.forEach(c => {
            const img = new Image();
            img.src = `https://flagcdn.com/w160/${c.code}.png`;
            images[c.code] = img;
        });

        async function loadBounceSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const res = await fetch('https://assets.mixkit.co/active_storage/sfx/2792/2792-preview.mp3');
                const arrayBuffer = await res.arrayBuffer();
                bounceBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            } catch (e) { console.log("Audio load error"); }
        }

        function playBounceSound() {
            if (!bounceBuffer || !audioCtx) return;
            const source = audioCtx.createBufferSource();
            source.buffer = bounceBuffer;
            source.connect(audioCtx.destination);
            source.start();
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1;
            speechSynthesis.cancel();
            speechSynthesis.speak(msg);
        }

        let flags = [];
        let rotation = 0;
        const gapSize = 0.7;

        function initGame() {
            flags = countries.map(c => ({
                img: images[c.code], name: c.name, code: c.code,
                x: cx, y: cy, dx: (Math.random()-0.5)*4, dy: (Math.random()-0.5)*4,
                r: 10, out: false
            }));
            document.getElementById('panel').innerHTML = '';
        }

        function animate() {
            if (!playing) return;
            ctx.clearRect(0,0,size,size);
            rotation += 0.02;

            ctx.beginPath();
            ctx.arc(cx, cy, radius, rotation + gapSize, rotation + 2*Math.PI);
            ctx.strokeStyle = '#00f7ff';
            ctx.lineWidth = 4;
            ctx.stroke();

            for (let i = flags.length-1; i>=0; i--) {
                const f = flags[i];
                f.x += f.dx; f.y += f.dy; f.dy += 0.05;

                const dx = f.x - cx, dy = f.y - cy, dist = Math.sqrt(dx*dx + dy*dy);

                if (dist + f.r > radius && !f.out) {
                    let angle = Math.atan2(dy, dx);
                    if (angle < 0) angle += 2*Math.PI;
                    const rotNorm = rotation % (2*Math.PI);
                    if (!(angle > rotNorm && angle < rotNorm + gapSize)) {
                        const nx = dx/dist, ny = dy/dist;
                        const dot = f.dx*nx + f.dy*ny;
                        f.dx -= 2*dot*nx; f.dy -= 2*dot*ny;
                        playBounceSound();
                    } else { f.out = true; }
                }

                if (f.out && dist > radius + 20) {
                    const panel = document.getElementById('panel');
                    const div = document.createElement('div');
                    div.className = 'flag-item';
                    div.innerHTML = `<img src="${f.img.src}">`;
                    panel.appendChild(div);
                    if (panel.children.length > 24) panel.removeChild(panel.firstChild);
                    flags.splice(i,1);
                    continue;
                }

                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.beginPath(); ctx.arc(0,0,f.r,0,Math.PI*2); ctx.clip();
                ctx.drawImage(f.img, -f.r, -f.r, f.r*2, f.r*2);
                ctx.restore();
            }

            if (flags.length === 1) {
                playing = false;
                showWinner(flags[0]);
                return;
            }
            requestAnimationFrame(animate);
        }

        function showWinner(f) {
            const winDiv = document.getElementById('winner');
            document.getElementById('winname').innerText = f.name;
            document.getElementById('winflag').src = f.img.src;
            winDiv.style.display = 'block';
            speak(`Congratulations! ${f.name} is the winner!`);

            setTimeout(() => {
                winDiv.style.display = 'none';
                startGame();
            }, 5000);
        }

        function startGame() {
            playing = true;
            initGame();
            if (audioCtx) audioCtx.resume();
            loadBounceSound();
            animate();
        }

        window.closeFirstPopup = function() {
            localStorage.setItem('hasVisited', 'true');
            document.getElementById('firstPopup').style.display = 'none';
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioCtx.resume().then(() => {
                startGame();
                speak("Welcome to the arena! The battle begins.");
            });
        };

        // অটো স্টার্ট চেক
        window.onload = () => {
            if (localStorage.getItem('hasVisited')) {
                document.getElementById('firstPopup').style.display = 'none';
                // ব্রাউজার সিকিউরিটির জন্য অনেক সময় সরাসরি অডিও চলে না, 
                // তাই প্রথমবার ভিজিটে পপআপ রাখা নিরাপদ। 
                // যদি পপআপ ছাড়া করতে চান, নিচে startGame() কল করুন।
                startGame(); 
            }
        };

        // অনলাইন ইউজার আপডেট
        setInterval(() => {
            const p = 1100 + Math.floor(Math.random()*200);
            document.getElementById('players').innerText = p + " online";
        }, 3000);

    })();
</script>
</body>
</html>
